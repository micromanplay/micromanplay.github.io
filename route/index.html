<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Open route in RaahMetro</title>
  <meta name="theme-color" content="#2D3FE0" />
  <style>
    :root { --primary: #2D3FE0; --bg: #F7F9FC; --text: #111827; --muted: #4B5563; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .card {
      width: 100%; max-width: 420px; background: #fff; border-radius: 24px;
      padding: 32px 28px; box-shadow: 0 18px 50px rgba(16,24,40,0.12); text-align: center;
    }
    .badge {
      width: 72px; height: 72px; border-radius: 20px; background: var(--primary);
      margin: 0 auto 18px; display: flex; align-items: center; justify-content: center;
    }
    .badge svg { width: 44px; height: 44px; }
    h1 { font-size: 22px; margin: 0 0 6px; }
    p { color: var(--muted); font-size: 15px; line-height: 1.5; margin: 0 0 22px; }
    .route { font-weight: 700; color: var(--text); }
    .btn {
      display: block; width: 100%; padding: 15px 18px; border-radius: 14px;
      font-size: 16px; font-weight: 700; text-decoration: none; margin-bottom: 12px;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-secondary { background: #EEF1FE; color: var(--primary); }
    .hint { font-size: 13px; color: #9097A3; margin-top: 6px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M22 82 L40 46 L70 40" stroke="#fff" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="22" cy="82" r="8.5" fill="#fff"/>
        <circle cx="40" cy="46" r="8.5" fill="#fff"/>
        <circle cx="40" cy="46" r="3.8" fill="#2D3FE0"/>
        <path d="M70 26 a14 14 0 1 1 -0.1 0 Z M70 40 l-9 16 a1 1 0 0 0 18 0 Z" fill="#fff"/>
        <circle cx="70" cy="40" r="6" fill="#2D3FE0"/>
      </svg>
    </div>
    <h1>Open this route in RaahMetro</h1>
    <p><span class="route" id="route">your metro route</span><br/>Tap below to open it in the app.</p>
    <a class="btn btn-primary" id="openApp" href="#">Open in RaahMetro</a>
    <a class="btn btn-secondary" id="getApp"
       href="https://play.google.com/store/apps/details?id=com.raahmetro.app">Get the app</a>
    <div class="hint">Don't have the app? Install it, then tap the link again.</div>
  </div>

  <script>
    (function () {
      var qs = new URLSearchParams(location.search);
      var cityId = qs.get('cityId');
      var fromStationId = qs.get('fromStationId');
      var toStationId = qs.get('toStationId');

      var deepLink = 'raahmetro://route';
      if (cityId && fromStationId && toStationId) {
        deepLink += '?cityId=' + encodeURIComponent(cityId) +
                    '&fromStationId=' + encodeURIComponent(fromStationId) +
                    '&toStationId=' + encodeURIComponent(toStationId);
      }
      document.getElementById('openApp').setAttribute('href', deepLink);

      // Try to open the app automatically on mobile.
      var isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      if (isMobile && cityId && fromStationId && toStationId) {
        setTimeout(function () { window.location.href = deepLink; }, 350);
      }
    })();
  </script>
</body>
</html>
